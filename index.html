<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>📝 Mis Tareas</h1>

      <!-- HU-01: Agregar tarea -->
      <div class="input-group">
        <input
          type="text"
          id="taskInput"
          placeholder="Nueva tarea..."
          maxlength="100"
          onkeydown="handleInputKey(event)"
        />
        <span id="inputError" class="error-msg"></span>
        <button onclick="addTask()">Agregar</button>
      </div>

      <!-- HU-04: Contador -->
      <p id="counter">Tareas pendientes: 0</p>

      <!-- HU-05: Filtros -->
      <div class="filters">
        <button onclick="filterTasks('all')">Todas</button>
        <button onclick="filterTasks('active')">Activas</button>
        <button onclick="filterTasks('done')">Completadas</button>
      </div>

      <!-- Lista de tareas -->
      <ul id="taskList"></ul>

      <!-- NUEVO — HU-03: Indicador de persistencia para el usuario -->
      <div class="persistence-footer">
        <span class="cloud-icon">💾</span> Tus tareas se guardan automáticamente en este dispositivo.
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
